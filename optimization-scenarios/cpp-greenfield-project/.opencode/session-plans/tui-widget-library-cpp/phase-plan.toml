
[plan]
description = "Add a TUI component library to cpp-demo-project (C++23, CMake, Pixi) supporting text label, progress bar, table, and interactive input box widgets. Structured as a complex DAG with nested user collaboration phases, asymmetric branching, shared primitive merge points, and per-widget isolated rendering branches."

# ─────────────────────────────────────────────────────────
# PHASE 1 — Top-level collaboration: widget selection,
#            library choice, and architecture decision
# ─────────────────────────────────────────────────────────
[[phases]]
id = "widget-selection-and-arch"
type = "collaborate"
is-branch = true
next = ["setup-shared-primitives", "setup-all-independent"]
discussion-topics = [
  "Which of the 4 candidate widgets to include: text label, progress bar, table, interactive input box (all 4 or a prioritized subset)",
  "TUI library selection: FTXUI v6.1.9 (MIT, zero deps, functional/DOM, all 4 widgets built-in) vs. finalcut v0.10.0+ (LGPLv3, Qt-like OOP, ncurses backend, no native grid table) vs. TermOx (MIT, C++20, ANSI, smaller community)",
  "Global rendering architecture: [shared-primitives-arch] build a shared primitive module (IWidget interface, ColorPalette, BorderElement, LayoutEngine, TextRenderer) that all selected widgets derive from before branching into widget-specific implementations, vs. [all-independent-arch] keep all widget rendering fully independent with no shared base, each widget on its own isolated branch end-to-end",
  "Confirm package management approach: CPM via gh:ArthurSonzogni/FTXUI#v6.1.9 (none on conda-forge); any additional pixi deps needed (e.g. ncurses for finalcut)",
  "Library target structure preference: monolithic lib/tui/ CMakeLists.txt subdirectory vs. per-widget subdirectories under lib/tui/widgets/",
]
planning-context = [
  "Research found FTXUI v6.1.9 as primary recommendation: C++23 compatible, zero external deps, native support for all 4 widget types (text/gauge/Table/Input), unified stateless/functional DOM model, MIT license, active 2025 maintenance.",
  "finalcut requires pixi add ncurses and has no native grid table widget; TermOx requires C++20 min and has unclear Escape library conda-forge status.",
  "All 4 widgets share 4 rendering primitive groups in FTXUI: border/separator chars, color palette, column layout engine, text rendering — making a shared primitive module both viable and high-value.",
  "No TUI or terminal code exists in the project currently; this is the first external C++ library integration. CPM.cmake v0.42.1 is already bootstrapped.",
  "The user explicitly requires involvement in widget selection and per-widget rendering approach decisions before any implementation begins.",
]
web-search-instructions = [
  "Search for latest FTXUI release tag and changelog: github.com/ArthurSonzogni/FTXUI/releases",
  "Search for finalcut latest stable tag and C++23 compatibility status: github.com/gansm/finalcut",
  "Search for TermOx latest release and Escape library availability: github.com/a-n-t-h-o-n-y/TermOx",
  "Verify conda-forge package availability for all 3 candidate libraries: prefix.dev search",
]

# ─────────────────────────────────────────────────────────
# PHASE 2a — Shared primitives path: deliberate on setup
# ─────────────────────────────────────────────────────────
[[phases]]
id = "setup-shared-primitives"
type = "deliberate"
is-branch = false
next = ["implement-shared-primitives"]
deliberation-instructions = [
  "Determine the exact CPMAddPackage call for the chosen library (e.g. for FTXUI: NAME FTXUI GIT_REPOSITORY https://github.com/ArthurSonzogni/FTXUI.git GIT_TAG v6.1.9 OPTIONS 'FTXUI_BUILD_EXAMPLES OFF' 'FTXUI_BUILD_TESTS OFF')",
  "Determine the lib/tui/ directory structure: lib/tui/CMakeLists.txt, lib/tui/include/tui/, lib/tui/src/ — map out all files to create",
  "Define the IWidget abstract interface in C++23: pure virtual render(), optional update(), widget metadata",
  "Define the 4 shared primitive modules: ColorPalette, BorderElement, LayoutEngine, TextRenderer — headers and minimal implementation stubs",
  "Determine how root CMakeLists.txt must be updated: add_subdirectory(lib/tui), CPMAddPackage block, target_link_libraries for the tui library target",
  "Determine if any pixi add commands are needed for the chosen library (FTXUI: none; finalcut: pixi add ncurses)",
  "Determine the correct CMake link targets for chosen library (FTXUI: ftxui::screen ftxui::dom ftxui::component)",
]
planning-context = [
  "This deliberation phase precedes the shared primitive implementation. It resolves all setup decisions so the implement phase can execute without ambiguity.",
  "The shared primitive module is the merge point — all 4 widget branches derive from it before diverging into widget-specific implementations.",
  "Project has CPM.cmake v0.42.1 bootstrapped; no active CPMAddPackage calls yet. lib/ directory does not exist and must be created.",
]
web-search-instructions = [
  "Search FTXUI CMake integration guide: arthursonzogni.github.io/FTXUI/installation_cmake.html",
  "Search FTXUI API reference for IWidget/Element/Component base types and C++23 usage patterns",
  "Search CPM.cmake documentation for OPTIONS field syntax and GIT_TAG pinning: github.com/cpm-cmake/CPM.cmake",
  "Search CMake best practices for add_subdirectory library targets with INTERFACE/PUBLIC headers in C++23",
]
project-survey-instructions = [
  "Read root CMakeLists.txt and app/CMakeLists.txt to understand current target structure",
  "Read cmake/CPM.cmake to confirm bootstrap pattern and version",
  "Read pixi.toml to confirm current tasks and dependency list",
  "Read CMakePresets.json to confirm preset names (dev, release) for later build commands",
]

