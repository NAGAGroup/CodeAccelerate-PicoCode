  "Confirm lib/ directory does not exist before creating it",
  "Read root CMakeLists.txt to identify exact insertion points for add_subdirectory and CPMAddPackage",
]
setup-instructions = [
  "Add CPMAddPackage call for chosen library to root CMakeLists.txt (e.g. FTXUI: NAME FTXUI GIT_REPOSITORY https://github.com/ArthurSonzogni/FTXUI.git GIT_TAG v6.1.9 OPTIONS 'FTXUI_BUILD_EXAMPLES OFF' 'FTXUI_BUILD_TESTS OFF')",
  "If finalcut was chosen: run `pixi add ncurses` to add ncurses to pixi.toml",
  "Create directory structure: lib/tui/include/tui/, lib/tui/src/",
  "Create lib/tui/CMakeLists.txt defining a STATIC or INTERFACE library target named tui-widgets",
  "Add add_subdirectory(lib/tui) to root CMakeLists.txt",
  "Wire tui-widgets target to chosen library link targets in lib/tui/CMakeLists.txt",
]
implement-instructions = [
  "Create lib/tui/include/tui/IWidget.hpp: define IWidget abstract base class in C++23 with pure virtual render() returning chosen library's Element/Component type, virtual ~IWidget() = default, and any shared widget metadata (id, visibility)",
  "Create lib/tui/include/tui/ColorPalette.hpp and lib/tui/src/ColorPalette.cpp: define ColorPalette struct/class wrapping chosen library's color/decorator system, providing named color constants and style helpers",
  "Create lib/tui/include/tui/BorderElement.hpp and lib/tui/src/BorderElement.cpp: define BorderElement providing border(), titled_border(), and separator() wrappers over chosen library's border primitives",
  "Create lib/tui/include/tui/LayoutEngine.hpp and lib/tui/src/LayoutEngine.cpp: define LayoutEngine providing flex(), fixed_width(), fixed_height(), and hbox/vbox composition helpers",
  "Create lib/tui/include/tui/TextRenderer.hpp and lib/tui/src/TextRenderer.cpp: define TextRenderer providing styled_text(), bold_text(), colored_text() wrappers over chosen library's text() element",
  "Add all source files to tui-widgets CMake target in lib/tui/CMakeLists.txt",
  "Use angle brackets for all external headers (e.g. <ftxui/dom/elements.hpp> not 'ftxui/dom/elements.hpp')",
]
verify-instructions = [
  "Run: pixi run format — must exit 0 with no clang-format errors",
  "Run: pixi run build dev — must compile successfully with zero errors and zero warnings for the tui-widgets target",
  "Run: pixi run build release — must compile successfully in release configuration",
  "Confirm compile_commands.json symlink exists and contains entries for new lib/tui/ source files",
  "Confirm CPM successfully fetches and builds chosen library (check build/dev/_deps/ for fetched sources)",
]
constraints = [
  "All external headers must use angle brackets: <ftxui/dom/elements.hpp> not quotes",
  "Pixi for all package management: conda-forge first, CPM only for GitHub-only deps",
  "C++23 standard must be maintained: CMAKE_CXX_STANDARD 23, extensions OFF",
  "pixi run format must pass before any build verification",
  "Do not modify app/src/main.cpp in this phase",
  "CPMAddPackage must pin to an exact version tag, not a branch",
]

