  "Implements: lib/tui/ directory structure, IWidget interface, ColorPalette, BorderElement, LayoutEngine, TextRenderer primitives, and the CMake lib target wired to the chosen TUI library via CPM.",
  "This is the DAG merge point — all 4 widget implementations will link against this target.",
]
web-search-instructions = [
  "Search FTXUI DOM element API: text(), border(), color(), flex(), width(), height() usage and header includes",
  "Search FTXUI Component API: Component base type, Ref<T> pattern, ScreenInteractive setup",
