
[[phases]]
id = "phase-1-deliberate"
type = "deliberate"
next = ["phase-1-implement"]
is-branch = false
planning-context = [
  "The project is a minimal C++23 CMake/Pixi project with a single source file (app/src/main.cpp) using std::format and std::print.",
  "Phase 1 requires integrating the {fmt} library from conda-forge and creating a reusable message formatting utility module.",
  "No header or source files beyond main.cpp currently exist. The Nushell format scripts glob app/**/*.{cpp,hpp}, so new files under app/ are automatically picked up.",
  "The fmt conda-forge package name is confirmed as `fmt`. CMake target is `fmt::fmt`. Header is `<fmt/format.h>`. API: fmt::format(\"Hello, {}!\", name).",
  "All design decisions (file layout, namespace, API signatures, CMake target naming) must be made here and recorded for use in the implementation and documentation phases."
]
deliberation-instructions = [
  "Decide on the directory layout for the new formatting utility module. Options: (a) flat in app/src/ alongside main.cpp, or (b) a dedicated app/src/msgfmt/ subdirectory. Choose and justify.",
  "Decide on the header filename and source filename (e.g., formatter.hpp / formatter.cpp, or msgfmt.hpp / msgfmt.cpp).",
  "Decide on the C++ namespace to use for the formatting utility (e.g., `msgfmt`, `util`, `demo::fmt`).",
  "Decide on the public API function signatures: at minimum a function equivalent to std::format('Hello, {}!', name). Consider whether to expose a single `format_message(std::string_view name)` or a more general `format_string(std::string_view tmpl, ...)` or both.",
  "Decide on the CMake library target name for the new module (e.g., `msgfmt`, `formatter`, `demo-fmt`).",
  "Decide whether the new library target should be STATIC or INTERFACE (it has a .cpp file, so STATIC is standard).",
  "Record all decisions explicitly in a structured format (decision name → chosen value → rationale). These decisions must be stored and carried into the implementation and documentation phases."
]
web-search-instructions = [
  "Search for best practices for structuring reusable C++ utility modules in a CMake project (header + source, add_library, target_include_directories).",
  "Search for fmt library official documentation: https://fmt.dev/latest/api/ — confirm fmt::format signature and <fmt/format.h> header path.",
  "Search for CMake target_include_directories and target_link_libraries patterns for a library consumed by an executable in the same CMake project."
]
project-analysis-instructions = [
  "Read app/CMakeLists.txt to understand the current executable target structure.",
  "Read CMakeLists.txt (root) to confirm CPM include location and find_package insertion point.",
  "Read app/src/main.cpp to confirm exactly which std::format / std::print calls need to be replaced."
]


[[phases]]
id = "phase-1-implement"
type = "implement-code"
next = ["phase-1-document"]
planning-context = [
  "Phase 1 deliberation will have produced recorded decisions on: module file layout, filenames, namespace, API signatures, CMake target name.",
  "The fmt conda-forge package name is `fmt`. Install via `pixi add fmt`. CMake: `find_package(fmt REQUIRED)`. Target: `fmt::fmt`. Header: `<fmt/format.h>`.",
  "app/CMakeLists.txt currently only has: add_executable(cpp-demo src/main.cpp) — no libraries linked.",
  "Root CMakeLists.txt already includes cmake/CPM.cmake; find_package(fmt REQUIRED) must be added before add_subdirectory(app).",
  "The Nushell format script globs app/**/*.{cpp,hpp} — new files under app/ are automatically formatted.",
  "Hard constraint: pixi run format must precede pixi run build. No raw cmake or system commands."
]
web-search-instructions = [
  "Search for fmt library CMake integration guide: find_package(fmt REQUIRED) and target_link_libraries with fmt::fmt — https://fmt.dev/dev/get-started/",
  "Search for CMake add_library STATIC with target_include_directories and target_link_libraries for internal module targets.",
  "Search for CMake target_include_directories(target PUBLIC include/) pattern for exposing headers to dependent targets.",
  "Search for fmt::format C++ API usage examples with string formatting — https://fmt.dev/latest/api/"
]
project-survey-instructions = [
  "Read the decisions recorded by the Phase 1 deliberation step from Qdrant (collection: cpp-demo-fmt-argparse-extension) before beginning any setup or implementation.",
  "Confirm the current state of app/CMakeLists.txt, root CMakeLists.txt, and app/src/main.cpp before making any changes."
]
setup-instructions = [
  "Run `pixi add fmt` to add the fmt library to the Pixi environment (conda-forge). Verify it appears in pixi.toml under [dependencies].",
  "Add `find_package(fmt REQUIRED)` to the root CMakeLists.txt, placed after `include(cmake/CPM.cmake)` and before `add_subdirectory(app)`.",
  "Create the new formatting utility module files at the paths decided in Phase 1 deliberation (e.g., app/src/formatter.hpp and app/src/formatter.cpp).",
  "Update app/CMakeLists.txt: add an add_library() target for the new module, configure target_include_directories, and link fmt::fmt to it. Then link the new module target to the cpp-demo executable via target_link_libraries."
]
implement-instructions = [
  "Implement the formatter header (.hpp): declare the namespace and API function signatures decided in Phase 1 deliberation. Include <fmt/format.h> using angle brackets. Include a header guard or #pragma once.",
  "Implement the formatter source (.cpp): include the header, implement the API functions using fmt::format(). The implementation must replace the std::format-equivalent functionality.",
  "Update app/src/main.cpp: remove #include <format> and #include <print>, add the include for the new formatter header (using angle brackets or the project-relative path as appropriate), and replace the std::format call with the new module API call. Retain the same 'Hello, World!' output behavior."
]
verify-instructions = [
  "Run `pixi run format` — must complete with no errors. This is mandatory before any build step.",
  "Run `pixi run build dev` — must complete with zero errors and zero warnings.",
  "Run `pixi run demo dev` — the binary must produce output equivalent to 'Hello, World!' (exact message may vary based on deliberation decisions but must demonstrate the formatter module is used).",
  "Confirm that app/src/main.cpp no longer contains any std::format or std::print calls.",
  "Confirm that fmt::fmt (or fmt::fmt-header-only) appears in the target_link_libraries chain in app/CMakeLists.txt."
]
constraints = [
  "Never run raw cmake, ninja, or system commands. All commands must be prefixed with `pixi run`.",
  "pixi run format must always precede pixi run build — this order is non-negotiable.",
  "The fmt library must be added via `pixi add fmt` (conda-forge), not via CPMAddPackage.",
  "All new C++ files must use angle brackets for external/system headers (e.g., <fmt/format.h>, not \"fmt/format.h\").",
  "The new module must be a proper CMake library target linked to cpp-demo — not a header-only include or direct source addition.",
  "All deliberation decisions from Phase 1 must be retrieved from Qdrant and respected during implementation."
]


